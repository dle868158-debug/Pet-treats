<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录注册｜爪味自然</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='80'>🐾</text></svg>" />
    <meta name="description" content="登录或注册爪味自然账号，也可以游客身份浏览商品。" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell" aria-labelledby="auth-title">
      <section class="auth-dialog">
        <a class="brand auth-brand" href="auth.html" aria-label="爪味自然登录页">
          <span class="brand-mark">爪</span>
          <span>爪味自然</span>
        </a>
        <div class="auth-copy">
          <p class="eyebrow">会员账号</p>
          <h1 id="auth-title">登录后保存地址，游客也可以先逛逛。</h1>
          <p>游客可以浏览和加购商品，但提交订单和管理收货地址需要登录账号。</p>
        </div>

        <div class="auth-tabs" role="tablist" aria-label="登录注册切换">
          <button class="auth-tab is-active" type="button" data-auth-tab="login" role="tab" aria-selected="true">登录</button>
          <button class="auth-tab" type="button" data-auth-tab="register" role="tab" aria-selected="false">注册</button>
        </div>

        <form class="auth-form is-active" data-login-form>
          <label>
            邮箱
            <input name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
          </label>
          <label>
            密码
            <input name="password" type="password" autocomplete="current-password" placeholder="请输入密码" required />
          </label>
          <button class="primary-button full-width" type="submit">登录</button>
        </form>

        <form class="auth-form" data-register-form>
          <label>
            昵称
            <input name="name" type="text" autocomplete="name" placeholder="例如：小爪用户" required />
          </label>
          <label>
            邮箱
            <input name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
          </label>
          <label>
            密码
            <input name="password" type="password" autocomplete="new-password" placeholder="至少 6 位" required />
          </label>
          <button class="secondary-button full-width" type="submit">注册并登录</button>
        </form>

        <button class="plain-button full-width" type="button" data-guest-entry>游客进入</button>
        <p class="auth-message" data-auth-message role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="auth.js"></script>
  </body>
</html>

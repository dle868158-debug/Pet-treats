<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F6F8F3"/>
  <text x="60" y="78" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="43" font-weight="800" fill="#1E2A25">前台购买链路已经具备从种草到下单的演示闭环</text>
  <text x="60" y="116" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="20" fill="#5F6E65">静态商城不止展示商品，还能演示筛选、详情、加购、地址与订单写入</text>
  <line x1="116" y1="252" x2="1118" y2="252" stroke="#8EB69B" stroke-width="4" stroke-linecap="round"/>
  <polygon points="1118,242 1142,252 1118,262" fill="#8EB69B"/>
  <rect x="60" y="176" width="180" height="154" rx="18" fill="#FFFFFF" stroke="#DDE6DB" stroke-width="1.5"/>
  <circle cx="150" cy="208" r="28" fill="#EEF4EC"/>
  <use data-icon="tabler-filled/tags" x="134" y="192" width="32" height="32" fill="#2F5D50"/>
  <text x="150" y="270" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" font-weight="800" fill="#1E2A25">分类筛选</text>
  <text x="150" y="302" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" fill="#5F6E65">宠物和食品类型</text>
  <rect x="300" y="176" width="180" height="154" rx="18" fill="#FFFFFF" stroke="#DDE6DB" stroke-width="1.5"/>
  <circle cx="390" cy="208" r="28" fill="#EEF4EC"/>
  <use data-icon="tabler-filled/list-check" x="374" y="192" width="32" height="32" fill="#2F5D50"/>
  <text x="390" y="270" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" font-weight="800" fill="#1E2A25">查看详情</text>
  <text x="390" y="302" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" fill="#5F6E65">成分和适用场景</text>
  <rect x="540" y="176" width="180" height="154" rx="18" fill="#FFFFFF" stroke="#DDE6DB" stroke-width="1.5"/>
  <circle cx="630" cy="208" r="28" fill="#EEF4EC"/>
  <use data-icon="tabler-filled/shopping-cart" x="614" y="192" width="32" height="32" fill="#D6A756"/>
  <text x="630" y="270" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" font-weight="800" fill="#1E2A25">加入购物车</text>
  <text x="630" y="302" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" fill="#5F6E65">数量和总价联动</text>
  <rect x="780" y="176" width="180" height="154" rx="18" fill="#FFFFFF" stroke="#DDE6DB" stroke-width="1.5"/>
  <circle cx="870" cy="208" r="28" fill="#EEF4EC"/>
  <use data-icon="tabler-filled/user" x="854" y="192" width="32" height="32" fill="#D6A756"/>
  <text x="870" y="270" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" font-weight="800" fill="#1E2A25">填写地址</text>
  <text x="870" y="302" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" fill="#5F6E65">用户与收货信息</text>
  <rect x="1020" y="176" width="180" height="154" rx="18" fill="#2F5D50"/>
  <circle cx="1110" cy="208" r="28" fill="#FFFFFF" fill-opacity="0.18"/>
  <use data-icon="tabler-filled/receipt-yuan" x="1094" y="192" width="32" height="32" fill="#FFFFFF"/>
  <text x="1110" y="270" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF">生成订单</text>
  <text x="1110" y="302" text-anchor="middle" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="18" fill="#FFFFFF">写入本地订单</text>
  <rect x="92" y="410" width="1096" height="146" rx="20" fill="#FFFFFF" stroke="#DDE6DB" stroke-width="1.5"/>
  <text x="132" y="460" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="28" font-weight="800" fill="#1E2A25">对合作方的价值</text>
  <text x="132" y="510" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="23" fill="#5F6E65">1. 招商现场可直接模拟购买，降低“只有产品图”的抽象感</text>
  <text x="690" y="510" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="23" fill="#5F6E65">2. 真实下单后后台同步出现，便于演示经营闭环</text>
  <text x="60" y="674" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="15" fill="#8A968E">Source: index.html、script.js、auth.js 与 localStorage 订单结构</text>
  <text x="1220" y="674" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="15" fill="#8A968E" text-anchor="end">06</text>
</svg>

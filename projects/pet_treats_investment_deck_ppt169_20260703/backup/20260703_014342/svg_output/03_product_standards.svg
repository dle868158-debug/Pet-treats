<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F6F8F3"/>
  <text x="60" y="82" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="44" font-weight="800" fill="#1E2A25">三条产品标准把“天然”变成可复述的导购语言</text>
  <text x="60" y="120" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="20" fill="#5F6E65">从详情页字段出发，形成门店、私域和团购都能直接使用的产品说明</text>
  <image href="../images/hero-natural-treats.png" x="792" y="150" width="390" height="420" preserveAspectRatio="xMidYMid slice"/>
  <rect x="766" y="126" width="444" height="470" rx="22" fill="none" stroke="#DDE6DB" stroke-width="2"/>
  <line x1="142" y1="176" x2="142" y2="566" stroke="#8EB69B" stroke-width="5" stroke-linecap="round"/>
  <circle cx="142" cy="214" r="26" fill="#2F5D50"/>
  <use data-icon="tabler-filled/shield-check" x="128" y="200" width="28" height="28" fill="#FFFFFF"/>
  <rect x="190" y="168" width="520" height="98" rx="14" fill="#FFFFFF" stroke="#DDE6DB" stroke-width="1.5"/>
  <text x="220" y="207" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="27" font-weight="800" fill="#1E2A25">配方可信：成分、适用、适口性写清楚</text>
  <text x="220" y="240" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="19" fill="#5F6E65">详情弹窗里保留配料、适用文案、卖点标签，便于导购复述。</text>
  <circle cx="142" cy="360" r="26" fill="#D6A756"/>
  <use data-icon="tabler-filled/tags" x="128" y="346" width="28" height="28" fill="#FFFFFF"/>
  <rect x="190" y="314" width="520" height="98" rx="14" fill="#FFFFFF" stroke="#DDE6DB" stroke-width="1.5"/>
  <text x="220" y="353" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="27" font-weight="800" fill="#1E2A25">货架好分：宠物类型和食品分类双筛选</text>
  <text x="220" y="386" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="19" fill="#5F6E65">前台支持犬猫、零食类型筛选，帮助渠道做主题陈列。</text>
  <circle cx="142" cy="506" r="26" fill="#2F5D50"/>
  <use data-icon="tabler-filled/chart-area" x="128" y="492" width="28" height="28" fill="#FFFFFF"/>
  <rect x="190" y="460" width="520" height="98" rx="14" fill="#FFFFFF" stroke="#DDE6DB" stroke-width="1.5"/>
  <text x="220" y="499" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="27" font-weight="800" fill="#1E2A25">经营可看：价格、销量和订单进入统计</text>
  <text x="220" y="532" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="19" fill="#5F6E65">新品上架和真实下单都会进入后台销量和营业额展示。</text>
  <text x="60" y="674" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="15" fill="#8A968E">Source: 商品字段、前台筛选、后台统计逻辑</text>
  <text x="1220" y="674" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="15" fill="#8A968E" text-anchor="end">03</text>
</svg>

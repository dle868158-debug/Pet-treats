<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F6F8F3"/>
  <text x="60" y="78" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="43" font-weight="800" fill="#1E2A25">管理后台把招商演示从“产品展示”推进到“经营展示”</text>

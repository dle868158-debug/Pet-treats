  <text x="1080" y="306" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="25" font-weight="800" fill="#FFFFFF">86</text>
  <rect x="922" y="356" width="242" height="140" rx="14" fill="#FFFFFF"/>

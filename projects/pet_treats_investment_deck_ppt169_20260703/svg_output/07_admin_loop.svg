  <text x="198" y="388" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="19" fill="#5F6E65">pawNaturalOrders 保存真实订单，pawNaturalProducts 保存后台新品</text>
  <rect x="76" y="446" width="760" height="108" rx="18" fill="#FFFFFF" stroke="#DDE6DB" stroke-width="1.5"/>
  <rect x="96" y="466" width="74" height="68" rx="14" fill="#EEF4EC"/>

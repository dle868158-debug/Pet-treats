<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F6F8F3"/>
  <rect x="52" y="44" width="10" height="50" rx="5" fill="#2F5D50"/>
  <text x="82" y="78" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="42" font-weight="800" fill="#1E2A25">岚禾小食适合合作方快速讲清、快速陈列、快速演示</text>
  <text x="82" y="114" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="19" fill="#5F6E65">招商核心不是堆参数，而是把产品、场景和经营数据组织成可复述的成交逻辑</text>
  <rect x="60" y="164" width="260" height="186" rx="16" fill="#FFFFFF" stroke="#DDE6DB" stroke-width="1.5"/>
  <use data-icon="tabler-filled/list-check" x="88" y="190" width="38" height="38" fill="#2F5D50"/>
  <text x="88" y="278" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="62" font-weight="800" fill="#2F5D50">0</text>
  <text x="150" y="278" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="28" font-weight="700" fill="#5F6E65">登录门槛</text>
  <text x="88" y="315" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="20" fill="#5F6E65">后台公开演示，适合招商会现场打开</text>
  <rect x="350" y="164" width="260" height="186" rx="16" fill="#FFFFFF" stroke="#DDE6DB" stroke-width="1.5"/>
  <use data-icon="tabler-filled/shopping-cart" x="378" y="190" width="38" height="38" fill="#2F5D50"/>
  <text x="378" y="278" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="62" font-weight="800" fill="#2F5D50">5</text>
  <text x="438" y="278" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="28" font-weight="700" fill="#5F6E65">步购买链路</text>
  <text x="378" y="315" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="20" fill="#5F6E65">筛选、详情、购物车、地址、下单</text>
  <rect x="640" y="164" width="260" height="186" rx="16" fill="#FFFFFF" stroke="#DDE6DB" stroke-width="1.5"/>
  <use data-icon="tabler-filled/bone" x="668" y="190" width="38" height="38" fill="#D6A756"/>
  <text x="668" y="278" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="62" font-weight="800" fill="#D6A756">4</text>
  <text x="728" y="278" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="28" font-weight="700" fill="#5F6E65">类主推零食</text>
  <text x="668" y="315" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="20" fill="#5F6E65">鸡肉、冻干、洁齿、训练奖励</text>
  <rect x="930" y="164" width="290" height="186" rx="16" fill="#FFFFFF" stroke="#DDE6DB" stroke-width="1.5"/>
  <use data-icon="tabler-filled/dashboard" x="958" y="190" width="38" height="38" fill="#D6A756"/>
  <text x="958" y="278" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="62" font-weight="800" fill="#D6A756">1</text>
  <text x="1018" y="278" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="28" font-weight="700" fill="#5F6E65">套经营后台</text>
  <text x="958" y="315" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="20" fill="#5F6E65">订单、营业额、销量排行同步展示</text>
  <rect x="60" y="392" width="550" height="200" rx="18" fill="#EEF4EC" stroke="#DDE6DB" stroke-width="1.5"/>
  <text x="92" y="442" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="28" font-weight="800" fill="#1E2A25">招商表达重点</text>
  <text x="92" y="488" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#2F5D50">产品标准清楚</text>
  <text x="92" y="526" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#2F5D50">消费场景明确</text>
  <text x="92" y="564" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#2F5D50">经营数据能被演示</text>
  <rect x="640" y="392" width="580" height="200" rx="18" fill="#2F5D50"/>
  <use data-icon="tabler-filled/receipt-yuan" x="680" y="430" width="48" height="48" fill="#FFFFFF"/>
  <text x="754" y="458" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="30" font-weight="800" fill="#FFFFFF">一句话招商主张</text>
  <text x="754" y="508" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#FFFFFF">让合作方不只拿到一组 SKU，</text>
  <text x="754" y="544" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="24" fill="#FFFFFF">还能拿到一套可复制的陈列和复购话术。</text>
  <text x="60" y="674" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="15" fill="#8A968E">Source: 岚禾小食网页与项目代码</text>
  <text x="1220" y="674" font-family="'Microsoft YaHei', Arial, sans-serif" font-size="15" fill="#8A968E" text-anchor="end">02</text>
</svg>
